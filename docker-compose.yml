services:
  postgres:
    image: postgres:16-alpine
    container_name: roboking_crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: roboking
      POSTGRES_PASSWORD: roboking
      POSTGRES_DB: roboking_crm
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: roboking_crm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
